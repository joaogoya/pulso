name: 🚀 Deploy website on push

on: 
  push:
    branches: 
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: SamKirkland/FTP-Deploy-Action@v4.3.0 # Versão 2026: mais rápida e estável

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.3.5 # Versão corrigida e atualizada
      with:
        server: ${{ secrets.ftphost }}
        username: ${{ secrets.ftp_user }}
        password: ${{ secrets.ftp_password }}
        server-dir: ${{ secrets.ftp_server_dir }}